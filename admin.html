<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sherkall Intel | Admin</title>
  <meta name="theme-color" content="#07111C">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── VARIABLES ─────────────────────────────────── */
    :root {
      --navy:      #07111C;
      --navy-mid:  #0D1B2A;
      --navy-card: #112033;
      --navy-line: rgba(255,255,255,0.06);
      --gold:      #C9A227;
      --gold-dim:  rgba(201,162,39,0.12);
      --gold-bdr:  rgba(201,162,39,0.25);
      --white:     #F2F4F7;
      --grey:      #8892A4;
      --grey-lt:   #B0BAC8;
      --green:     #10B981;
      --red:       #EF4444;
      --amber:     #F59E0B;
      --radius:    14px;
      --radius-sm: 10px;
      --tr:        0.18s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow-x:hidden; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--navy);
      color: var(--white);
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:rgba(201,162,39,0.2); border-radius:4px; }

    /* ── TOPBAR ────────────────────────────────────── */
    .topbar {
      position: sticky; top:0; z-index:100;
      height: 56px;
      background: rgba(7,17,28,0.97);
      border-bottom: 1px solid var(--gold-bdr);
      display: flex; align-items:center; justify-content:space-between;
      padding: 0 20px;
      backdrop-filter: blur(20px);
    }
    .brand {
      display: flex; align-items:center; gap:10px;
      font-size:14px; font-weight:700; letter-spacing:0.5px;
    }
    .brand-icon {
      width:30px; height:30px; border-radius:8px;
      background: var(--gold-dim); border:1px solid var(--gold-bdr);
      display:flex; align-items:center; justify-content:center;
    }
    .brand span { color:var(--gold); }
    .brand-badge {
      padding:3px 9px; border-radius:20px;
      background: rgba(239,68,68,0.12);
      border:1px solid rgba(239,68,68,0.25);
      font-size:10px; font-weight:700; letter-spacing:1px;
      color:var(--red);
    }
    .topbar-right { display:flex; align-items:center; gap:10px; }
    .admin-name { font-size:12px; color:var(--grey); }
    .logout-btn {
      padding:6px 14px; border-radius:8px;
      background: rgba(239,68,68,0.08);
      border:1px solid rgba(239,68,68,0.2);
      color:var(--red); font-size:12px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:var(--tr);
    }
    .logout-btn:hover { background:rgba(239,68,68,0.15); }

    /* ── LAYOUT ────────────────────────────────────── */
    .main { max-width:900px; margin:0 auto; padding:24px 16px 80px; }

    /* ── STATS ROW ─────────────────────────────────── */
    .stats-row {
      display:grid; grid-template-columns:repeat(2,1fr);
      gap:10px; margin-bottom:24px;
    }
    @media(min-width:600px) { .stats-row { grid-template-columns:repeat(4,1fr); } }
    .stat-card {
      background: var(--navy-card);
      border:1px solid var(--navy-line);
      border-radius:var(--radius); padding:16px;
    }
    .stat-label { font-size:9px; font-weight:700; letter-spacing:1.5px; color:var(--grey); text-transform:uppercase; margin-bottom:8px; }
    .stat-value { font-size:32px; font-weight:700; font-family:'JetBrains Mono',monospace; line-height:1; }
    .stat-green { color:var(--green); }
    .stat-gold  { color:var(--gold); }
    .stat-red   { color:var(--red); }
    .stat-white { color:var(--white); }

    /* ── SECTION HEADER ────────────────────────────── */
    .section-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:14px; gap:12px; flex-wrap:wrap;
    }
    .section-title { font-size:18px; font-weight:700; }
    .search-wrap {
      flex:1; min-width:180px; max-width:300px;
      background:rgba(255,255,255,0.04);
      border:1px solid var(--navy-line);
      border-radius:var(--radius-sm);
      display:flex; align-items:center; gap:8px; padding:9px 12px;
    }
    .search-wrap svg { color:var(--grey); flex-shrink:0; }
    .search-wrap input {
      background:none; border:none; outline:none;
      color:var(--white); font-size:13px; font-family:inherit; flex:1;
    }
    .search-wrap input::placeholder { color:var(--grey); }
    .btn-primary {
      display:flex; align-items:center; gap:7px;
      padding:9px 18px; border-radius:var(--radius-sm);
      background:var(--gold); border:none;
      color:#000; font-size:13px; font-weight:700;
      cursor:pointer; font-family:inherit; transition:var(--tr);
      white-space:nowrap;
    }
    .btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
    .btn-primary:active { transform:none; }

    /* ── CLIENT CARDS ──────────────────────────────── */
    .client-list { display:flex; flex-direction:column; gap:10px; }
    .client-card {
      background: var(--navy-card);
      border:1px solid var(--navy-line);
      border-radius:var(--radius);
      padding:16px; cursor:pointer; transition:var(--tr);
      position:relative; overflow:hidden;
    }
    .client-card::before {
      content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
      background:var(--green);
    }
    .client-card.suspended::before { background:var(--red); }
    .client-card.no-device::before { background:var(--amber); }
    .client-card:hover { border-color:var(--gold-bdr); }
    .client-card:active { opacity:0.85; }

    .client-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:8px; }
    .client-name { font-size:15px; font-weight:700; }
    .client-email { font-size:11px; color:var(--grey); margin-top:2px; }

    .client-badges { display:flex; gap:6px; flex-shrink:0; flex-wrap:wrap; justify-content:flex-end; }
    .badge {
      padding:3px 9px; border-radius:20px;
      font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
    }
    .badge-plan    { background:var(--gold-dim); color:var(--gold); border:1px solid var(--gold-bdr); }
    .badge-active  { background:rgba(16,185,129,0.12); color:var(--green); border:1px solid rgba(16,185,129,0.2); }
    .badge-suspended { background:rgba(239,68,68,0.1); color:var(--red); border:1px solid rgba(239,68,68,0.2); }

    .client-card-bottom { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .client-meta { display:flex; gap:16px; }
    .client-meta-item { display:flex; flex-direction:column; gap:2px; }
    .meta-label { font-size:9px; font-weight:700; letter-spacing:1px; color:var(--grey); text-transform:uppercase; }
    .meta-value { font-size:12px; font-weight:600; color:var(--white); }
    .client-arrow { color:var(--grey); font-size:18px; flex-shrink:0; }

    .empty-state { text-align:center; padding:48px 16px; color:var(--grey); }
    .empty-icon { font-size:36px; opacity:0.3; margin-bottom:12px; }
    .empty-text { font-size:14px; line-height:1.6; }

    /* ── SLIDE-OVER (CLIENT DETAIL) ────────────────── */
    .overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.6);
      z-index:200; display:none;
      backdrop-filter:blur(3px);
    }
    .overlay.show { display:block; }

    .slide-over {
      position:fixed; right:0; top:0; bottom:0; width:100%; max-width:480px;
      background:var(--navy-mid);
      border-left:1px solid var(--gold-bdr);
      z-index:201; overflow-y:auto;
      transform:translateX(100%);
      transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);
      -webkit-overflow-scrolling:touch;
    }
    .slide-over.open { transform:none; }

    .so-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px; border-bottom:1px solid var(--navy-line);
      position:sticky; top:0;
      background:var(--navy-mid); z-index:1;
    }
    .so-close {
      width:32px; height:32px; border-radius:8px;
      background:rgba(255,255,255,0.05); border:1px solid var(--navy-line);
      color:var(--grey); font-size:16px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; transition:var(--tr); flex-shrink:0;
    }
    .so-close:hover { color:var(--white); }
    .so-body { padding:20px; }

    .so-section { margin-bottom:24px; }
    .so-section-title {
      font-size:10px; font-weight:700; letter-spacing:2px;
      color:var(--grey); text-transform:uppercase; margin-bottom:12px;
    }
    .info-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .info-item { display:flex; flex-direction:column; gap:4px; }
    .info-label { font-size:10px; font-weight:700; color:var(--grey); letter-spacing:1px; text-transform:uppercase; }
    .info-value { font-size:14px; font-weight:600; color:var(--white); }

    /* Devices in detail */
    .device-item {
      display:flex; align-items:center; justify-content:space-between;
      background:rgba(6,15,26,0.5); border:1px solid var(--navy-line);
      border-radius:var(--radius-sm); padding:12px; margin-bottom:8px;
    }
    .device-info .device-name { font-size:13px; font-weight:600; }
    .device-info .device-id { font-size:11px; color:var(--grey); font-family:'JetBrains Mono',monospace; margin-top:2px; }
    .device-info .device-plate { font-size:11px; color:var(--gold); margin-top:1px; }
    .btn-remove {
      padding:5px 12px; border-radius:var(--radius-sm);
      background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2);
      color:var(--red); font-size:11px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:var(--tr); white-space:nowrap;
    }
    .btn-remove:hover { background:rgba(239,68,68,0.15); }

    /* Assign device form */
    .assign-form { display:flex; flex-direction:column; gap:10px; }
    .form-label { font-size:11px; font-weight:700; color:var(--grey); letter-spacing:1px; text-transform:uppercase; margin-bottom:5px; display:block; }
    .form-select, .form-input {
      width:100%; padding:11px 14px;
      background:rgba(6,15,26,0.5); border:1px solid var(--navy-line);
      border-radius:var(--radius-sm); color:var(--white);
      font-size:13px; font-family:inherit; outline:none;
      transition:var(--tr);
    }
    .form-select option { background:var(--navy-mid); }
    .form-select:focus, .form-input:focus { border-color:var(--gold-bdr); }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btn-assign {
      width:100%; padding:12px;
      background:var(--gold); border:none; border-radius:var(--radius-sm);
      color:#000; font-size:13px; font-weight:700;
      cursor:pointer; font-family:inherit; transition:var(--tr);
    }
    .btn-assign:hover { opacity:0.9; }
    .btn-assign:disabled { opacity:0.5; cursor:not-allowed; }

    /* Action buttons in detail */
    .action-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .btn-action {
      padding:11px; border-radius:var(--radius-sm);
      font-size:12px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:var(--tr);
    }
    .btn-suspend {
      background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2);
      color:var(--amber);
    }
    .btn-suspend:hover { background:rgba(245,158,11,0.15); }
    .btn-suspend.suspended {
      background:rgba(16,185,129,0.08); border-color:rgba(16,185,129,0.2);
      color:var(--green);
    }
    .btn-password {
      background:rgba(255,255,255,0.04); border:1px solid var(--navy-line);
      color:var(--grey-lt);
    }
    .btn-password:hover { background:rgba(255,255,255,0.08); color:var(--white); }

    /* ── CREATE CLIENT MODAL ────────────────────────── */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7);
      z-index:300; display:none; align-items:center; justify-content:center;
      padding:16px; backdrop-filter:blur(4px);
    }
    .modal-overlay.show { display:flex; }
    .modal {
      background:var(--navy-mid);
      border:1px solid var(--gold-bdr);
      border-radius:20px; width:100%; max-width:480px;
      max-height:90vh; overflow-y:auto;
      animation:modalIn 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    @keyframes modalIn { from{transform:scale(0.96);opacity:0} to{transform:none;opacity:1} }

    .modal-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:20px 20px 0; margin-bottom:20px;
    }
    .modal-title { font-size:17px; font-weight:700; }
    .modal-body { padding:0 20px 24px; display:flex; flex-direction:column; gap:14px; }
    .form-group { display:flex; flex-direction:column; gap:6px; }

    /* Success state */
    .credentials-box {
      background:rgba(16,185,129,0.08); border:1px solid rgba(16,185,129,0.2);
      border-radius:var(--radius-sm); padding:16px; display:none;
    }
    .credentials-box.show { display:block; }
    .cred-title { font-size:12px; font-weight:700; color:var(--green); margin-bottom:10px; }
    .cred-row { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
    .cred-row:last-child { border-bottom:none; }
    .cred-key { font-size:11px; color:var(--grey); }
    .cred-val { font-size:12px; font-weight:600; font-family:'JetBrains Mono',monospace; color:var(--white); }

    /* Toast */
    .toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
      background:var(--navy-card); border:1px solid var(--gold-bdr);
      border-radius:var(--radius-sm); padding:12px 20px;
      font-size:13px; font-weight:600; color:var(--white);
      z-index:500; white-space:nowrap;
      animation:toastIn 0.3s ease;
      box-shadow:0 8px 24px rgba(0,0,0,0.4);
    }
    .toast.error { border-color:rgba(239,68,68,0.3); color:var(--red); }
    .toast.success { border-color:rgba(16,185,129,0.3); color:var(--green); }
    @keyframes toastIn { from{opacity:0;transform:translate(-50%,10px)} to{opacity:1;transform:translateX(-50%)} }

    /* Divider */
    .divider { height:1px; background:var(--navy-line); margin:4px 0; }

    /* Loading */
    .spinner {
      display:inline-block; width:14px; height:14px;
      border:2px solid rgba(255,255,255,0.2);
      border-top-color:var(--white); border-radius:50%;
      animation:spin 0.7s linear infinite;
    }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>

  <!-- ══ TOPBAR ══════════════════════════════════════ -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z" fill="rgba(201,162,39,0.2)" stroke="#C9A227" stroke-width="1.5"/>
          <path d="M9 12l2 2 4-4" stroke="#C9A227" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      SHERKALL <span>INTEL</span>
      <span class="brand-badge">ADMIN</span>
    </div>
    <div class="topbar-right">
      <span class="admin-name" id="admin-name"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <!-- ══ MAIN ════════════════════════════════════════ -->
  <main class="main">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <p class="stat-label">Total Clients</p>
        <p class="stat-value stat-white" id="stat-total">—</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Active</p>
        <p class="stat-value stat-green" id="stat-active">—</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Devices</p>
        <p class="stat-value stat-gold" id="stat-devices">—</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Suspended</p>
        <p class="stat-value stat-red" id="stat-suspended">—</p>
      </div>
    </div>

    <!-- Section header -->
    <div class="section-header">
      <h2 class="section-title">Clients</h2>
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Search clients..." oninput="filterClients()">
      </div>
      <button class="btn-primary" onclick="openCreateModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Client
      </button>
    </div>

    <!-- Client list -->
    <div class="client-list" id="client-list">
      <div class="empty-state">
        <div class="empty-icon">👥</div>
        <p class="empty-text">Loading clients...</p>
      </div>
    </div>

  </main>

  <!-- ══ CLIENT DETAIL SLIDE-OVER ════════════════════ -->
  <div class="overlay" id="overlay" onclick="closeDetail()"></div>
  <div class="slide-over" id="slide-over">
    <div class="so-header">
      <div>
        <p style="font-size:11px;color:var(--grey);margin-bottom:3px;">CLIENT DETAIL</p>
        <h2 id="so-name" style="font-size:17px;font-weight:700"></h2>
      </div>
      <button class="so-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="so-body" id="so-body"></div>
  </div>

  <!-- ══ CREATE CLIENT MODAL ═════════════════════════ -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Create New Client</h3>
        <button class="so-close" onclick="closeCreateModal()">✕</button>
      </div>
      <div class="modal-body">

        <!-- Success credentials box -->
        <div class="credentials-box" id="cred-box">
          <p class="cred-title">✅ Client created — share these credentials:</p>
          <div class="cred-row"><span class="cred-key">Email</span><span class="cred-val" id="cred-email"></span></div>
          <div class="cred-row"><span class="cred-key">Password</span><span class="cred-val" id="cred-password"></span></div>
          <div class="cred-row"><span class="cred-key">Login URL</span><span class="cred-val">sherkallintel.vercel.app/login.html</span></div>
        </div>

        <div id="create-form-fields">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Full Name *</label>
              <input class="form-input" id="f-name" type="text" placeholder="Mamadou Diallo">
            </div>
            <div class="form-group">
              <label class="form-label">Phone (WhatsApp)</label>
              <input class="form-input" id="f-phone" type="text" placeholder="+224 6XX XXX XXX">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Email *</label>
            <input class="form-input" id="f-email" type="email" placeholder="client@example.com">
          </div>

          <div class="form-group">
            <label class="form-label">Password *</label>
            <div style="display:flex;gap:8px">
              <input class="form-input" id="f-password" type="text" placeholder="Minimum 6 characters" style="flex:1">
              <button type="button" onclick="generatePassword()" style="padding:11px 14px;background:var(--gold-dim);border:1px solid var(--gold-bdr);border-radius:var(--radius-sm);color:var(--gold);font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap">
                Auto
              </button>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Plan</label>
              <select class="form-select" id="f-plan">
                <option value="basic">Basic</option>
                <option value="standard">Standard</option>
                <option value="premium">Premium</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Monthly Fee (GNF)</label>
              <input class="form-input" id="f-fee" type="number" placeholder="500000">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Notes</label>
            <input class="form-input" id="f-notes" type="text" placeholder="Internal notes about this client">
          </div>

          <button class="btn-assign" id="create-btn" onclick="createClient()">
            Create Client
          </button>
        </div>

      </div>
    </div>
  </div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════
const BACKEND = 'https://sherkall-backend-production.up.railway.app';
const token   = localStorage.getItem('sherkall_token');
const user    = JSON.parse(localStorage.getItem('sherkall_user') || '{}');

// ── Auth guard ─────────────────────────────────────────
if (!token || user.role !== 'admin') {
  window.location.href = '/login.html';
}

document.getElementById('admin-name').textContent = user.name || 'Admin';

function authHeaders(extra = {}) {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${token}`,
    ...extra
  };
}

function logout() {
  localStorage.removeItem('sherkall_token');
  localStorage.removeItem('sherkall_user');
  window.location.href = '/login.html';
}

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
let allClients     = [];
let traccarDevices = [];
let selectedClient = null;

// ══════════════════════════════════════════════════════
// LOAD DATA
// ══════════════════════════════════════════════════════
async function loadAll() {
  await Promise.all([loadOverview(), loadClients(), loadTraccarDevices()]);
}

async function loadOverview() {
  try {
    const res  = await fetch(`${BACKEND}/api/admin/overview`, { headers: authHeaders() });
    const data = await res.json();
    if (!data.success) return;
    const o = data.overview;
    document.getElementById('stat-total').textContent     = o.totalClients     ?? '0';
    document.getElementById('stat-active').textContent    = o.activeClients    ?? '0';
    document.getElementById('stat-devices').textContent   = o.totalDevices     ?? '0';
    document.getElementById('stat-suspended').textContent = o.suspendedClients ?? '0';
  } catch {}
}

async function loadClients() {
  try {
    const res  = await fetch(`${BACKEND}/api/admin/clients`, { headers: authHeaders() });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    allClients = data.clients || [];
    renderClients(allClients);
  } catch (err) {
    document.getElementById('client-list').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <p class="empty-text">Failed to load clients.<br>${err.message}</p>
      </div>`;
  }
}

async function loadTraccarDevices() {
  try {
    const res  = await fetch(`${BACKEND}/api/vehicles`, { headers: authHeaders() });
    const data = await res.json();
    if (data.success) traccarDevices = data.devices || [];
  } catch {}
}

// ══════════════════════════════════════════════════════
// RENDER CLIENTS
// ══════════════════════════════════════════════════════
function renderClients(clients) {
  const list = document.getElementById('client-list');

  if (!clients.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">👥</div>
        <p class="empty-text">No clients yet.<br>Create your first client to get started.</p>
      </div>`;
    return;
  }

  list.innerHTML = clients.map(c => {
    const deviceCount = c.client_devices?.length || 0;
    const isActive    = c.active;
    const hasDevice   = deviceCount > 0;
    const cardClass   = !isActive ? 'suspended' : !hasDevice ? 'no-device' : '';
    const statusBadge = isActive
      ? '<span class="badge badge-active">Active</span>'
      : '<span class="badge badge-suspended">Suspended</span>';
    const planBadge   = `<span class="badge badge-plan">${(c.plan||'basic').toUpperCase()}</span>`;
    const deviceLabel = deviceCount === 0 ? 'No device' : deviceCount === 1 ? '1 device' : `${deviceCount} devices`;

    return `
      <div class="client-card ${cardClass}" onclick="openDetail('${c.id}')">
        <div class="client-card-top">
          <div>
            <p class="client-name">${escHtml(c.name)}</p>
            <p class="client-email">${escHtml(c.email)}</p>
          </div>
          <div class="client-badges">${planBadge}${statusBadge}</div>
        </div>
        <div class="client-card-bottom">
          <div class="client-meta">
            <div class="client-meta-item">
              <span class="meta-label">Devices</span>
              <span class="meta-value">${escHtml(deviceLabel)}</span>
            </div>
            <div class="client-meta-item">
              <span class="meta-label">Since</span>
              <span class="meta-value">${new Date(c.created_at).toLocaleDateString('fr-FR')}</span>
            </div>
            ${c.phone ? `<div class="client-meta-item">
              <span class="meta-label">Phone</span>
              <span class="meta-value">${escHtml(c.phone)}</span>
            </div>` : ''}
          </div>
          <span class="client-arrow">›</span>
        </div>
      </div>`;
  }).join('');
}

function filterClients() {
  const q = document.getElementById('search-input').value.toLowerCase();
  renderClients(q
    ? allClients.filter(c =>
        c.name.toLowerCase().includes(q) ||
        c.email.toLowerCase().includes(q) ||
        (c.phone||'').includes(q))
    : allClients);
}

// ══════════════════════════════════════════════════════
// CLIENT DETAIL SLIDE-OVER
// ══════════════════════════════════════════════════════
function openDetail(clientId) {
  selectedClient = allClients.find(c => c.id === clientId);
  if (!selectedClient) return;
  renderDetail();
  document.getElementById('so-name').textContent = selectedClient.name;
  document.getElementById('overlay').classList.add('show');
  document.getElementById('slide-over').classList.add('open');
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('slide-over').classList.remove('open');
  selectedClient = null;
}

function renderDetail() {
  const c   = selectedClient;
  const sub = c.subscriptions?.[0];
  const el  = document.getElementById('so-body');

  // Build devices list
  const devicesList = (c.client_devices || []).map(d => `
    <div class="device-item">
      <div class="device-info">
        <p class="device-name">${escHtml(d.device_name || 'Unnamed device')}</p>
        <p class="device-id">ID: ${escHtml(String(d.traccar_device_id))}</p>
        ${d.vehicle_plate ? `<p class="device-plate">${escHtml(d.vehicle_plate)}</p>` : ''}
      </div>
      <button class="btn-remove" onclick="removeDevice('${c.id}','${d.traccar_device_id}')">Remove</button>
    </div>`).join('');

  // Build Traccar device dropdown (exclude already assigned)
  const assignedIds  = (c.client_devices||[]).map(d => String(d.traccar_device_id));
  const available    = traccarDevices.filter(d => !assignedIds.includes(String(d.id)));
  const deviceOptions = available.length
    ? available.map(d => `<option value="${d.id}">${escHtml(d.name)} (ID: ${d.id})</option>`).join('')
    : '<option value="" disabled>No available devices</option>';

  const isSuspended = !c.active;

  el.innerHTML = `
    <!-- Account Info -->
    <div class="so-section">
      <p class="so-section-title">Account Info</p>
      <div class="info-grid">
        <div class="info-item">
          <span class="info-label">Email</span>
          <span class="info-value" style="font-size:12px;word-break:break-all">${escHtml(c.email)}</span>
        </div>
        <div class="info-item">
          <span class="info-label">Plan</span>
          <span class="info-value" style="color:var(--gold)">${(c.plan||'basic').toUpperCase()}</span>
        </div>
        <div class="info-item">
          <span class="info-label">Status</span>
          <span class="info-value" style="color:${c.active?'var(--green)':'var(--red)'}">${c.active?'Active':'Suspended'}</span>
        </div>
        <div class="info-item">
          <span class="info-label">Phone</span>
          <span class="info-value">${c.phone ? escHtml(c.phone) : '—'}</span>
        </div>
        ${sub ? `
        <div class="info-item">
          <span class="info-label">Monthly Fee</span>
          <span class="info-value">${sub.monthly_fee ? Number(sub.monthly_fee).toLocaleString()+' '+(sub.currency||'GNF') : '—'}</span>
        </div>` : ''}
        <div class="info-item">
          <span class="info-label">Since</span>
          <span class="info-value">${new Date(c.created_at).toLocaleDateString('fr-FR')}</span>
        </div>
      </div>
      ${c.notes ? `<p style="margin-top:12px;font-size:12px;color:var(--grey);background:rgba(255,255,255,0.03);padding:10px;border-radius:8px;border:1px solid var(--navy-line)">${escHtml(c.notes)}</p>` : ''}
    </div>

    <div class="divider"></div>

    <!-- Assigned Devices -->
    <div class="so-section" style="margin-top:20px">
      <p class="so-section-title">Assigned Devices (${(c.client_devices||[]).length})</p>
      ${devicesList || '<p style="font-size:12px;color:var(--grey);margin-bottom:10px">No devices assigned yet.</p>'}
    </div>

    <!-- Assign New Device -->
    <div class="so-section">
      <p class="so-section-title">Assign Device</p>
      <div class="assign-form">
        <div class="form-group">
          <label class="form-label">Select Traccar Device</label>
          <select class="form-select" id="assign-device-select">
            <option value="">— Select device —</option>
            ${deviceOptions}
          </select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Friendly Name</label>
            <input class="form-input" id="assign-name" type="text" placeholder="e.g. Taxi 01">
          </div>
          <div class="form-group">
            <label class="form-label">Plate Number</label>
            <input class="form-input" id="assign-plate" type="text" placeholder="GN-1234-A">
          </div>
        </div>
        <button class="btn-assign" id="assign-btn" onclick="assignDevice()">
          Assign to Client
        </button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Actions -->
    <div class="so-section" style="margin-top:20px">
      <p class="so-section-title">Account Actions</p>
      <div class="action-row">
        <button class="btn-action btn-suspend ${isSuspended ? 'suspended' : ''}"
          onclick="toggleSuspend('${c.id}')">
          ${isSuspended ? '✅ Reactivate' : '⏸ Suspend'}
        </button>
        <button class="btn-action btn-password" onclick="resetPassword('${c.id}','${escHtml(c.name)}')">
          🔑 Reset Password
        </button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════
// ASSIGN DEVICE
// ══════════════════════════════════════════════════════
async function assignDevice() {
  const deviceId = document.getElementById('assign-device-select').value;
  const name     = document.getElementById('assign-name').value.trim();
  const plate    = document.getElementById('assign-plate').value.trim();
  const btn      = document.getElementById('assign-btn');

  if (!deviceId) { showToast('Select a device first', 'error'); return; }
  if (!selectedClient) return;

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Assigning...';

  try {
    const res  = await fetch(`${BACKEND}/api/admin/clients/${selectedClient.id}/devices`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({
        traccar_device_id: deviceId,
        device_name:       name  || null,
        vehicle_plate:     plate || null
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);

    showToast(`Device assigned to ${selectedClient.name} ✅`, 'success');
    await loadClients();
    await loadOverview();

    // Refresh detail panel
    selectedClient = allClients.find(c => c.id === selectedClient.id);
    if (selectedClient) renderDetail();

  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Assign to Client';
  }
}

// ══════════════════════════════════════════════════════
// REMOVE DEVICE
// ══════════════════════════════════════════════════════
async function removeDevice(clientId, deviceId) {
  if (!confirm('Remove this device from the client?')) return;
  try {
    const res  = await fetch(`${BACKEND}/api/admin/clients/${clientId}/devices/${deviceId}`, {
      method: 'DELETE', headers: authHeaders()
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);

    showToast('Device removed ✅', 'success');
    await loadClients();
    await loadOverview();
    selectedClient = allClients.find(c => c.id === clientId);
    if (selectedClient) renderDetail();

  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ══════════════════════════════════════════════════════
// SUSPEND / REACTIVATE
// ══════════════════════════════════════════════════════
async function toggleSuspend(clientId) {
  try {
    const res  = await fetch(`${BACKEND}/api/admin/clients/${clientId}/suspend`, {
      method: 'PUT', headers: authHeaders()
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);

    showToast(data.message, 'success');
    await loadClients();
    await loadOverview();
    selectedClient = allClients.find(c => c.id === clientId);
    if (selectedClient) renderDetail();

  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ══════════════════════════════════════════════════════
// RESET PASSWORD
// ══════════════════════════════════════════════════════
async function resetPassword(clientId, clientName) {
  const newPwd = generatePasswordString();
  if (!confirm(`Reset password for ${clientName}?\n\nNew password: ${newPwd}\n\nSave this before confirming.`)) return;

  try {
    const res  = await fetch(`${BACKEND}/api/admin/clients/${clientId}/password`, {
      method: 'PUT',
      headers: authHeaders(),
      body: JSON.stringify({ new_password: newPwd })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    showToast(`Password reset — new: ${newPwd}`, 'success');

  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ══════════════════════════════════════════════════════
// CREATE CLIENT MODAL
// ══════════════════════════════════════════════════════
function openCreateModal() {
  document.getElementById('create-modal').classList.add('show');
  document.getElementById('cred-box').classList.remove('show');
  document.getElementById('create-form-fields').style.display = 'flex';
  document.getElementById('create-form-fields').style.flexDirection = 'column';
  document.getElementById('create-form-fields').style.gap = '14px';
  clearCreateForm();
}

function closeCreateModal() {
  document.getElementById('create-modal').classList.remove('show');
}

function clearCreateForm() {
  ['f-name','f-email','f-phone','f-password','f-notes','f-fee'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('f-plan').value = 'basic';
}

async function createClient() {
  const name     = document.getElementById('f-name').value.trim();
  const email    = document.getElementById('f-email').value.trim();
  const password = document.getElementById('f-password').value.trim();
  const phone    = document.getElementById('f-phone').value.trim();
  const plan     = document.getElementById('f-plan').value;
  const fee      = document.getElementById('f-fee').value;
  const notes    = document.getElementById('f-notes').value.trim();
  const btn      = document.getElementById('create-btn');

  if (!name)     { showToast('Name is required', 'error'); return; }
  if (!email)    { showToast('Email is required', 'error'); return; }
  if (!password) { showToast('Password is required', 'error'); return; }
  if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Creating...';

  try {
    const res  = await fetch(`${BACKEND}/api/admin/clients`, {
      method: 'POST',
      headers: authHeaders(),
      body: JSON.stringify({
        name, email, password, phone: phone||null,
        plan, monthly_fee: fee||null, currency:'GNF',
        notes: notes||null
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);

    // Show credentials
    document.getElementById('cred-email').textContent    = email;
    document.getElementById('cred-password').textContent = password;
    document.getElementById('cred-box').classList.add('show');
    document.getElementById('create-form-fields').style.display = 'none';

    await loadClients();
    await loadOverview();
    showToast(`${name} created ✅`, 'success');

  } catch (err) {
    showToast(err.message, 'error');
    btn.disabled = false;
    btn.innerHTML = 'Create Client';
  }
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function generatePasswordString() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  return Array.from({length:10}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
}

function generatePassword() {
  document.getElementById('f-password').value = generatePasswordString();
}

function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showToast(msg, type='') {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 4000);
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
loadAll();
</script>
