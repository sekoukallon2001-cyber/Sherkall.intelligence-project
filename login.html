<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sherkall Intelligence | Connexion</title>
  <link rel="canonical" href="https://sherkallintel.vercel.app/login.html">
  <link rel="icon" href="/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0D1B2A;
      --navy-dark: #060F1A;
      --navy-mid: #112240;
      --blue: #0A84FF;
      --gold: #C9A227;
      --gold-light: #D4A017;
      --white: #F2F4F7;
      --grey: #8892A4;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--navy-dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
      color: var(--white);
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      background: rgba(6,15,26,0.95);
      border-bottom: 1px solid rgba(201,162,39,0.2);
    }

    .nav-logo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--white);
      text-decoration: none;
    }

    .nav-logo span { color: var(--gold); }

    .nav-back {
      color: var(--grey);
      text-decoration: none;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--gold); }

    /* MAIN CONTAINER */
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    /* Background grid */
    .login-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(10,132,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(10,132,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* LOGIN CARD */
    .login-card {
      background: rgba(17,34,64,0.9);
      border: 1px solid rgba(201,162,39,0.25);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0,0,0,0.5);
    }

    /* Gold top border */
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      border-radius: 2px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 8px;
    }

    .login-logo-text {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--white);
    }

    .login-logo-text span { color: var(--gold); }

    .login-subtitle {
      text-align: center;
      color: var(--grey);
      font-size: 13px;
      margin-bottom: 36px;
      letter-spacing: 0.5px;
    }

    /* TABS */
    .login-tabs {
      display: flex;
      background: rgba(6,15,26,0.6);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      color: var(--grey);
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .tab-btn.active {
      background: var(--gold);
      color: var(--navy-dark);
    }

    /* FORM */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--grey);
      margin-bottom: 8px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(6,15,26,0.8);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--white);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,162,39,0.15);
    }

    .form-input::placeholder { color: rgba(136,146,164,0.5); }

    /* PASSWORD TOGGLE */
    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--grey);
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }

    /* SUBMIT BUTTON */
    .login-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--navy-dark);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Montserrat', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(201,162,39,0.35);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* ERROR & SUCCESS MESSAGES */
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .alert.error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #FCA5A5;
    }

    .alert.success {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86EFAC;
    }

    .alert.show { display: block; }

    /* LOADING SPINNER */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(13,27,42,0.3);
      border-top-color: var(--navy-dark);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* FOOTER */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--grey);
      font-size: 12px;
    }

    .login-footer a {
      color: var(--gold);
      text-decoration: none;
    }

    /* WHATSAPP HELP */
    .wa-help {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      padding: 12px;
      background: rgba(37,211,102,0.08);
      border: 1px solid rgba(37,211,102,0.2);
      border-radius: 10px;
      color: #86EFAC;
      font-size: 12px;
      text-decoration: none;
      transition: all 0.2s;
    }

    .wa-help:hover {
      background: rgba(37,211,102,0.15);
    }

    /* MOBILE */
    @media (max-width: 480px) {
      .login-card {
        padding: 32px 24px;
        border-radius: 16px;
      }
      nav { padding: 12px 20px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-logo">SHERKALL <span>INTELLIGENCE</span></a>
    <a href="/" class="nav-back">← Retour au site</a>
  </nav>

  <!-- LOGIN -->
  <div class="login-container">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-text">SHERKALL <span>INTEL</span></div>
      </div>
      <p class="login-subtitle">PORTAIL CLIENT · GPS INTELLIGENCE</p>

      <!-- Tabs -->
      <div class="login-tabs">
        <button class="tab-btn active" onclick="setTab('client')">👤 Client</button>
        <button class="tab-btn" onclick="setTab('admin')">⚙️ Admin</button>
      </div>

      <!-- Alert -->
      <div class="alert error" id="error-msg"></div>
      <div class="alert success" id="success-msg"></div>

      <!-- Form -->
      <form onsubmit="handleLogin(event)">

        <div class="form-group">
          <label class="form-label">Email</label>
          <input
            type="email"
            id="login-email"
            class="form-input"
            placeholder="votre@email.com"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <div class="password-wrapper">
            <input
              type="password"
              id="login-password"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            >
            <button type="button" class="password-toggle" onclick="togglePassword()">👁</button>
          </div>
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          Se connecter
        </button>

      </form>

      <!-- Footer -->
      <div class="login-footer">
        <p>Problème de connexion?</p>
      </div>

      <!-- WhatsApp Help -->
      <a href="https://wa.me/224629255946?text=Bonjour,%20j'ai%20un%20problème%20de%20connexion%20au%20portail" 
         class="wa-help" target="_blank">
        💬 Contacter le support WhatsApp
      </a>

    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://sherkall-backend-production.up.railway.app';
    let currentTab = 'client';

    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tab === 'client') || (i === 1 && tab === 'admin'));
      });
      clearAlerts();
    }

    function togglePassword() {
      const input = document.getElementById('login-password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('success-msg').classList.remove('show');
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-msg');
      el.textContent = msg;
      el.classList.add('show');
      document.getElementById('error-msg').classList.remove('show');
    }

    function clearAlerts() {
      document.getElementById('error-msg').classList.remove('show');
      document.getElementById('success-msg').classList.remove('show');
    }

    async function handleLogin(e) {
      e.preventDefault();
      clearAlerts();

      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const btn = document.getElementById('login-btn');

      // Loading state
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Connexion...';

      try {
        const response = await fetch(`${BACKEND_URL}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          const isAdmin  = data.user.role === 'admin';
          const onAdminTab = currentTab === 'admin';

          // Enforce tab-role match
          if (isAdmin && !onAdminTab) {
            localStorage.removeItem('sherkall_token');
            localStorage.removeItem('sherkall_user');
            sessionStorage.removeItem('sherkall_token');
            sessionStorage.removeItem('sherkall_user');
            showError('Admin account detected. Please use the Admin tab.');
            btn.disabled = false;
            btn.innerHTML = 'Se connecter';
            return;
          }

          if (!isAdmin && onAdminTab) {
            localStorage.removeItem('sherkall_token');
            localStorage.removeItem('sherkall_user');
            sessionStorage.removeItem('sherkall_token');
            sessionStorage.removeItem('sherkall_user');
            showError('This tab is for admin accounts only.');
            btn.disabled = false;
            btn.innerHTML = 'Se connecter';
            return;
          }

          // Write sessionStorage FIRST — dashboard reads this on load
          // sessionStorage must be set before the redirect fires
          sessionStorage.setItem('sherkall_token', data.token);
          sessionStorage.setItem('sherkall_user', JSON.stringify(data.user));
          // localStorage second — for persistence across new tabs
          localStorage.setItem('sherkall_token', data.token);
          localStorage.setItem('sherkall_user', JSON.stringify(data.user));

          showSuccess('Connexion réussie! Redirection...');

          // Redirect immediately — no setTimeout
          // setTimeout causes sessionStorage to be cleared on some
          // Android Chrome versions before the next page loads
          window.location.href = isAdmin ? '/admin.html' : '/dashboard.html';

        } else {
          showError(data.message || 'Email ou mot de passe incorrect');
          btn.disabled = false;
          btn.innerHTML = 'Se connecter';
        }

      } catch (error) {
        showError('Erreur de connexion. Vérifiez votre internet.');
        btn.disabled = false;
        btn.innerHTML = 'Se connecter';
      }
    }
  </script>

</body>
</html>
